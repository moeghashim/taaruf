<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taaruf · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F4EC;
      --panel: #FFFFFF;
      --ink: #14201A;
      --ink-2: #35453C;
      --mute: #6B7A72;
      --line: #E1DBCB;
      --line-2: #EFEAD9;
      --accent: #2E4A3E;
      --accent-2: #406556;
      --gold: #B08A3E;
      --rose: #9C3E3A;
      --amber: #C78A2D;
      --green: #3B7A54;
      --blue: #3B5F7A;
      --bg-tint: #F0ECE0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: "Inter Tight", sans-serif; font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    .serif { font-family: "Cormorant Garamond", Georgia, serif; font-weight: 500; letter-spacing: -0.01em; }
    .mono { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.04em; }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    h1,h2,h3,h4 { margin: 0; font-weight: 500; }
    a { color: inherit; text-decoration: none; }
    p { margin: 0; }
    input, select, textarea { font: inherit; color: inherit; }

    /* App shell */
    .shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

    /* Sidebar */
    .side {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .brand { padding: 6px 20px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line-2); margin-bottom: 16px; }
    .brand svg { width: 24px; height: 24px; }
    .brand-name { font-family: "Cormorant Garamond"; font-size: 22px; letter-spacing: -0.01em; }
    .brand-tag { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mute); margin-top: 2px; }

    .nav-section { padding: 8px 12px; }
    .nav-section h5 { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mute); padding: 12px 8px 8px; font-weight: 500; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--ink-2);
      cursor: pointer;
      transition: background 120ms;
      position: relative;
    }
    .nav-item:hover { background: var(--bg-tint); }
    .nav-item.active { background: var(--accent); color: #F7F4EC; }
    .nav-item.active .count { background: rgba(255,255,255,0.15); color: #F7F4EC; }
    .nav-item .icon { width: 16px; height: 16px; opacity: 0.7; }
    .nav-item.active .icon { opacity: 1; }
    .nav-item .count {
      margin-left: auto;
      background: var(--bg-tint);
      color: var(--ink-2);
      padding: 2px 7px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 500;
      font-family: "JetBrains Mono";
    }
    .nav-item .count.urgent { background: var(--rose); color: white; }

    .side-foot { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--line-2); font-size: 11px; color: var(--mute); display: flex; align-items: center; gap: 10px; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: white; display: grid; place-items: center; font-size: 11px; font-weight: 500; }

    /* Main */
    .main { display: flex; flex-direction: column; min-width: 0; }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 28px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 10;
    }
    .crumb { display: flex; align-items: center; gap: 8px; color: var(--mute); font-size: 12px; }
    .crumb .now { color: var(--ink); }
    .search {
      flex: 1;
      max-width: 420px;
      margin-left: 20px;
      position: relative;
    }
    .search input {
      width: 100%;
      padding: 8px 14px 8px 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      font-size: 13px;
    }
    .search input:focus { outline: none; border-color: var(--accent); background: white; }
    .search .glass { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--mute); }
    .topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .ibtn { width: 32px; height: 32px; border-radius: 6px; display: grid; place-items: center; color: var(--ink-2); cursor: pointer; position: relative; }
    .ibtn:hover { background: var(--bg-tint); }
    .ibtn .dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--rose); border: 2px solid var(--panel); }

    /* Content */
    .content { padding: 28px; flex: 1; }
    .page-head { display: flex; align-items: end; justify-content: space-between; margin-bottom: 28px; gap: 20px; flex-wrap: wrap; }
    .page-head h1 { font-family: "Cormorant Garamond"; font-size: 42px; line-height: 1; margin-bottom: 6px; }
    .page-head h1 em { font-style: italic; color: var(--accent); }
    .page-head p { color: var(--mute); font-size: 14px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      transition: all 140ms;
    }
    .btn:hover { background: var(--bg-tint); }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-primary:hover { background: #24392F; border-color: #24392F; }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
    .btn-ghost:hover { background: var(--bg-tint); }
    .btn-sm { padding: 5px 10px; font-size: 11px; }

    /* Stat cards */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .stat h4 { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); margin-bottom: 12px; font-weight: 500; }
    .stat .big { font-family: "Cormorant Garamond"; font-size: 40px; line-height: 1; letter-spacing: -0.02em; }
    .stat .sub { margin-top: 8px; font-size: 11px; color: var(--mute); display: flex; gap: 10px; align-items: center; }
    .stat .trend { font-family: "JetBrains Mono"; color: var(--green); font-size: 11px; }
    .stat .trend.down { color: var(--rose); }
    .stat .spark { position: absolute; right: 16px; top: 16px; width: 60px; height: 24px; opacity: 0.6; }

    /* Panels */
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--line-2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-head h3 { font-family: "Cormorant Garamond"; font-size: 22px; font-weight: 500; }
    .panel-head .tools { display: flex; gap: 8px; align-items: center; }
    .panel-body { padding: 0; }

    /* Two col */
    .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mute);
      font-weight: 500;
      padding: 12px 16px;
      background: var(--bg-tint);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    td { padding: 12px 16px; border-bottom: 1px solid var(--line-2); vertical-align: middle; }
    tr.row-click { cursor: pointer; }
    tr.row-click:hover td { background: var(--bg-tint); }
    td .name { font-weight: 500; color: var(--ink); }
    td .sub { color: var(--mute); font-size: 11px; margin-top: 2px; }
    .who { display: flex; align-items: center; gap: 10px; }
    .who .av { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-tint); display: grid; place-items: center; font-size: 12px; font-weight: 500; color: var(--ink-2); border: 1px solid var(--line); overflow: hidden; flex-shrink: 0; }
    .who.f .av { background: #F4E7E6; color: #8A3B37; }
    .who.m .av { background: #E5EBE7; color: #2E4A3E; }

    /* Pills */
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: var(--bg-tint);
      color: var(--ink-2);
      border: 1px solid var(--line);
      white-space: nowrap;
    }
    .pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--mute); }
    .pill.green { background: #E8F1EB; color: var(--green); border-color: #C5DCCD; }
    .pill.green::before { background: var(--green); }
    .pill.amber { background: #FBF0DA; color: #8A5E1B; border-color: #EEDAAA; }
    .pill.amber::before { background: var(--amber); }
    .pill.rose { background: #F7E5E4; color: var(--rose); border-color: #EACAC8; }
    .pill.rose::before { background: var(--rose); }
    .pill.blue { background: #E5EEF5; color: var(--blue); border-color: #C6D6E3; }
    .pill.blue::before { background: var(--blue); }
    .pill.gold { background: #F5EBD0; color: #7A5E25; border-color: #E3D3A3; }
    .pill.gold::before { background: var(--gold); }
    .pill.plain { background: var(--bg-tint); border-color: var(--line); }

    /* Tabs */
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); padding: 0 20px; }
    .tab { padding: 10px 14px; font-size: 13px; color: var(--mute); border-bottom: 2px solid transparent; cursor: pointer; margin-bottom: -1px; }
    .tab:hover { color: var(--ink-2); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .cnt { margin-left: 6px; font-size: 10px; padding: 1px 6px; border-radius: 99px; background: var(--bg-tint); color: var(--mute); font-family: "JetBrains Mono"; }
    .tab.active .cnt { background: #E5EBE7; color: var(--accent); }

    /* Filter row */
    .filters { display: flex; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--line-2); align-items: center; flex-wrap: wrap; }
    .filt {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      color: var(--ink-2);
    }
    .filt.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .filt:hover:not(.active) { background: var(--bg-tint); }
    .chevron { color: var(--mute); font-size: 10px; }

    /* Match workbench / compose view */
    .bench { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line-2); border-top: 1px solid var(--line-2); }
    .bench-col { background: var(--panel); padding: 24px; }
    .bench-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--line-2); }
    .bench-head .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mute); }
    .prof {
      display: grid; grid-template-columns: 80px 1fr; gap: 16px; margin-bottom: 20px;
    }
    .prof-photo {
      aspect-ratio: 1;
      border-radius: 6px;
      background: var(--bg-tint);
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .prof-photo .ph { position: absolute; inset: 0; display: grid; place-items: center; color: var(--mute); font-family: "Cormorant Garamond"; font-size: 28px; }
    .prof .name { font-family: "Cormorant Garamond"; font-size: 24px; margin-bottom: 2px; line-height: 1; }
    .prof .meta { font-size: 12px; color: var(--mute); }
    .prof .chips { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

    .fact-list { display: flex; flex-direction: column; }
    .fact { display: grid; grid-template-columns: 110px 1fr; padding: 8px 0; border-bottom: 1px solid var(--line-2); font-size: 13px; }
    .fact .k { color: var(--mute); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
    .fact .v { color: var(--ink); }
    .fact:last-child { border: 0; }

    .compat {
      background: var(--bg-tint);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-top: 12px;
    }
    .compat h4 { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mute); margin-bottom: 14px; font-weight: 500; }
    .score-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 12px; }
    .score-row .lbl { width: 110px; color: var(--ink-2); }
    .score-row .bar { flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
    .score-row .bar div { height: 100%; background: var(--accent); }
    .score-row .bar div.low { background: var(--amber); }
    .score-row .bar div.vlow { background: var(--rose); }
    .score-row .v { width: 40px; text-align: right; font-family: "JetBrains Mono"; color: var(--ink); font-size: 11px; }

    /* Queue cards */
    .qcard {
      display: grid;
      grid-template-columns: 48px 1fr auto auto auto;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line-2);
      align-items: center;
      cursor: pointer;
      transition: background 120ms;
    }
    .qcard:hover { background: var(--bg-tint); }
    .qcard .rank { font-family: "Cormorant Garamond"; font-style: italic; font-size: 28px; color: var(--accent); line-height: 1; text-align: center; }
    .qcard .pair { display: flex; gap: 16px; }
    .qcard .pair .person { display: flex; gap: 10px; align-items: center; }
    .qcard .mid { font-size: 16px; color: var(--mute); align-self: center; }
    .qcard .actions { display: flex; gap: 6px; }

    /* Donut/progress */
    .donut { position: relative; width: 140px; height: 140px; margin: 0 auto; }
    .donut-lbl { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; }
    .donut-lbl .big { font-family: "Cormorant Garamond"; font-size: 32px; line-height: 1; }
    .donut-lbl .sm { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mute); margin-top: 4px; }

    /* Activity */
    .act { padding: 14px 20px; border-bottom: 1px solid var(--line-2); display: grid; grid-template-columns: 28px 1fr auto; gap: 12px; align-items: start; }
    .act:last-child { border: 0; }
    .act .icon { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-tint); display: grid; place-items: center; color: var(--ink-2); }
    .act .icon.green { background: #E8F1EB; color: var(--green); }
    .act .icon.rose { background: #F7E5E4; color: var(--rose); }
    .act .icon.amber { background: #FBF0DA; color: #8A5E1B; }
    .act .icon.blue { background: #E5EEF5; color: var(--blue); }
    .act .msg { font-size: 13px; color: var(--ink-2); line-height: 1.5; }
    .act .msg strong { color: var(--ink); font-weight: 500; }
    .act .time { color: var(--mute); font-size: 11px; white-space: nowrap; font-family: "JetBrains Mono"; }

    /* Segmented */
    .seg { display: inline-flex; background: var(--bg-tint); border: 1px solid var(--line); border-radius: 6px; padding: 2px; }
    .seg button { padding: 4px 12px; font-size: 11px; border-radius: 4px; color: var(--mute); }
    .seg button.on { background: var(--panel); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }

    /* Kanban / pipeline */
    .pipeline { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
    .lane {
      background: var(--bg-tint);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 400px;
    }
    .lane-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 2px 4px; }
    .lane-head h4 { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-2); font-weight: 500; }
    .lane-head .cnt { font-size: 10px; color: var(--mute); font-family: "JetBrains Mono"; background: var(--panel); padding: 2px 7px; border-radius: 99px; border: 1px solid var(--line); }
    .lane-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: grab;
      transition: all 140ms;
    }
    .lane-card:hover { transform: translateY(-1px); box-shadow: 0 3px 8px -4px rgba(0,0,0,0.12); }
    .lane-card .pair-mini { display: flex; gap: 8px; align-items: center; font-size: 12px; font-weight: 500; margin-bottom: 8px; }
    .lane-card .pair-mini .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .lane-card .meta { font-size: 11px; color: var(--mute); display: flex; gap: 8px; }

    /* Modal-like detail pane */
    .detail-pane {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 520px;
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -20px 0 40px -20px rgba(0,0,0,0.15);
      z-index: 100;
      transform: translateX(100%);
      transition: transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
      display: flex;
      flex-direction: column;
    }
    .detail-pane.open { transform: none; }
    .dp-head { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .dp-body { flex: 1; overflow-y: auto; }

    .backdrop {
      position: fixed; inset: 0; background: rgba(20, 32, 26, 0.3); z-index: 99;
      opacity: 0; pointer-events: none; transition: opacity 200ms;
    }
    .backdrop.open { opacity: 1; pointer-events: auto; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: var(--mute); }

    /* Small responsive */
    @media (max-width: 1100px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .pipeline { grid-template-columns: repeat(3, 1fr); overflow-x: auto; }
      .two-col { grid-template-columns: 1fr; }
      .bench { grid-template-columns: 1fr; }
    }

    /* Hamburger — shown only on mobile */
    .hamburger {
      display: none;
      width: 36px; height: 36px;
      border-radius: 6px;
      place-items: center;
      cursor: pointer;
      color: var(--ink-2);
      flex-shrink: 0;
    }
    .hamburger:hover { background: var(--bg-tint); }

    /* Profile photos — img fills .av/.prof-photo, initials sit behind as fallback */
    .who .av img, .dp-av img, .prof-photo img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .who .av { position: relative; }
    .dp-av { width: 44px; height: 44px; border-radius: 50%; position: relative; overflow: hidden; display: grid; place-items: center; font-size: 14px; font-weight: 500; flex-shrink: 0; background: var(--bg-tint); color: var(--ink-2); border: 1px solid var(--line); }
    .dp-av.f { background: #F4E7E6; color: #8A3B37; }
    .dp-av.m { background: #E5EBE7; color: #2E4A3E; }

    /* History rows in profile detail pane */
    .history-list { display: flex; flex-direction: column; margin-bottom: 24px; border: 1px solid var(--line-2); border-radius: 6px; overflow: hidden; }
    .history-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 10px 12px; border-bottom: 1px solid var(--line-2); align-items: center; font-size: 12px; }
    .history-row:last-child { border-bottom: 0; }
    .history-row .who-mini { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .history-row .who-mini .av-mini { width: 24px; height: 24px; border-radius: 50%; overflow: hidden; position: relative; flex-shrink: 0; background: var(--bg-tint); display: grid; place-items: center; font-size: 10px; color: var(--ink-2); }
    .history-row .who-mini .av-mini img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .history-row .who-mini .lbl { font-size: 10px; color: var(--mute); letter-spacing: 0.06em; text-transform: uppercase; }
    .history-row .who-mini .name { font-weight: 500; color: var(--ink); }
    .history-row .meta { display: flex; gap: 8px; align-items: center; font-family: "JetBrains Mono"; font-size: 10px; color: var(--mute); }
    .history-empty { padding: 14px; text-align: center; color: var(--mute); font-size: 12px; }

    /* Mobile layout */
    @media (max-width: 768px) {
      html, body { font-size: 14px; }
      .shell { grid-template-columns: 1fr; }
      .side {
        position: fixed; top: 0; left: 0; bottom: 0;

                      <h4 style={{fontSize:10,letterSpacing:"0.16em",textTransform:"uppercase",color:"var(--mute)",marginBottom:10,fontWeight:500,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span>Interest signals</span>
                        <span className="mono" style={{fontSize:10,color:"var(--mute)",letterSpacing:"0.04em",textTransform:"none"}}>{total} total · {sent.length} sent · {received.length} received</span>
                      </h4>
                      {total ? (
                        <div className="history-list">
                          {sent.map(i => renderRow(i, "sent"))}
                          {received.map(i => renderRow(i, "received"))}
                        </div>
                      ) : (
                        <div className="history-empty" style={{marginBottom:24,border:"1px solid var(--line-2)",borderRadius:6}}>No interest signals yet.</div>
                      )}
                    </>
                  );
                })()}

                <h4 style={{fontSize:10,letterSpacing:"0.16em",textTransform:"uppercase",color:"var(--mute)",marginBottom:10,fontWeight:500}}>Admin notes</h4>
                <textarea rows="4" style={{width:"100%",padding:12,border:"1px solid var(--line)",borderRadius:6,font:"inherit",fontSize:13,resize:"vertical",marginBottom:16}} placeholder="Private notes about this member…"/>

                <div style={{display:"flex",gap:8,flexWrap:"wrap",paddingTop:16,borderTop:"1px solid var(--line-2)"}}>
                  <button className="btn btn-primary">Suggest a match</button>
                  <button className="btn">Send profile link</button>
                  <button className="btn">Email</button>
                  <button className="btn btn-ghost" style={{color:"var(--rose)"}}>Pause search</button>
                </div>
              </div>
            </div>
          </aside>
        </>
      );
    };

    // --- Placeholder pages ---
    const Simple = ({ title, desc, children }) => (
      <>
        <div className="page-head">
          <div>
            <h1 dangerouslySetInnerHTML={{__html: title}}/>
            <p>{desc}</p>
          </div>
        </div>
        {children || (
          <div className="panel">
            <div style={{padding:"80px 20px",textAlign:"center",color:"var(--mute)"}}>
              <div style={{fontFamily:"Cormorant Garamond",fontStyle:"italic",fontSize:28,color:"var(--ink-2)",marginBottom:8}}>Coming soon.</div>
              <p>This surface will ship after matching pipeline is stable.</p>
            </div>
          </div>
        )}
      </>
    );

    // ———————————————————————————
    // App
    // ———————————————————————————
    const CRUMBS = {
      dashboard: "Dashboard", inbox: "Inbox", profiles: "Profiles", pending: "Pending",
      workbench: "Match workbench", pipeline: "Pipeline", interests: "Interests",
      events: "Events", settings: "Settings",
    };

    const App = () => {
      const [page, setPage] = React.useState("dashboard");
      const [openProfileId, setOpenProfileId] = React.useState(null);
      const [sideOpen, setSideOpen] = React.useState(false);
      const openProfile = (id) => setOpenProfileId(id);
      const openMatch = (id) => { setPage("workbench"); setSideOpen(false); };

      return (
        <div className="shell">
          <Sidebar page={page} setPage={setPage} open={sideOpen} onClose={()=>setSideOpen(false)}/>
          <div className="main">
            <Topbar crumb={CRUMBS[page] || "Dashboard"} onMenu={()=>setSideOpen(true)}/>
            <div className="content">
              {page === "dashboard" && <Dashboard setPage={setPage} openMatch={openMatch}/>}
              {page === "profiles" && <Profiles openProfile={openProfile}/>}
              {page === "pending" && <Profiles openProfile={openProfile}/>}
              {page === "workbench" && <Workbench openMatch={openMatch}/>}
              {page === "pipeline" && <Pipeline openMatch={openMatch}/>}
              {page === "interests" && <Interests/>}
              {page === "inbox" && <Simple title="<em>Inbox</em>" desc="Emails, interests, and member questions in one place."/>}
              {page === "events" && <Simple title="<em>Events</em>" desc="Brunches, halaqas, retreats."/>}
              {page === "settings" && <Simple title="<em>Settings</em>" desc="Slot caps, payment keys, admin users."/>}
            </div>
          </div>
          <DetailPane open={!!openProfileId} onClose={()=>setOpenProfileId(null)} profileId={openProfileId}/>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
